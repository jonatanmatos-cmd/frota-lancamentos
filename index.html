<script>
  // URL DO APP DA WEB ATUALIZADO COM O SEU LINK NOVO
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrMqi_P7VWAzjch-BofPlJpQg6Ixd35ZDCJfVNX7IZVblWZEg1ZRwk74ovZTPvS83C/exec";

  // Carrega as placas em tempo real vindas do cadastro do Drive
  window.addEventListener("load", function() {
    fetch(SCRIPT_URL)
      .then(response => response.json())
      .then(data => {
        if (data.status === "ok") {
          const campoPlaca = document.getElementById("placa");
          campoPlaca.innerHTML = '<option value="">Selecione a Placa...</option>';
          data.placas.forEach(placa => {
            let op = document.createElement("option");
            op.value = placa;
            op.textContent = placa;
            campoPlaca.appendChild(op);
          });
        } else {
          alert("Erro do sistema ao carregar os veículos: " + data.message);
        }
      })
      .catch(err => console.error("Erro na comunicação:", err));
  });

  function alternarCampos() {
    const tipo = document.getElementById("tipo").value;
    const secaoOrcamento = document.getElementById("secaoOrcamento");
    const secaoPosServico = document.getElementById("secaoPosServico");
    if (tipo === "orcamento") {
      secaoOrcamento.style.display = "block";
      secaoPosServico.style.display = "none";
    } else {
      secaoOrcamento.style.display = "none";
      secaoPosServico.style.display = "block";
    }
  }

  function converterParaBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) resolve({ base64: "", nome: "", tipo: "" });
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => {
        const stringBase64 = reader.result.split(",")[1];
        resolve({ base64: stringBase64, nome: file.name, tipo: file.type });
      };
      reader.onerror = error => reject(error);
    });
  }

  document.getElementById("formManutencao").addEventListener("submit", async function(e) {
    e.preventDefault();
    const btn = document.getElementById("btnEnviar");
    const statusDiv = document.getElementById("mensagemStatus");
    
    btn.disabled = true;
    btn.innerText = "A enviar...";
    statusDiv.style.color = "orange";
    statusDiv.innerText = "A processar...";

    try {
      const tipo = document.getElementById("tipo").value;
      let payload = {
        tipo: tipo,
        numeroOrcamento: document.getElementById("numeroOrcamento").value,
        placa: document.getElementById("placa").value,
        motorista: document.getElementById("motorista").value,
        observacoes: document.getElementById("observacoes").value
      };

      if (tipo === "orcamento") {
        payload.filial = document.getElementById("filial").value;
        payload.tipoManutencao = document.getElementById("tipoManutencao").value;
        payload.fornecedor = document.getElementById("fornecedor").value;
        payload.valor = document.getElementById("valor").value;
        payload.dataPrevisao = document.getElementById("dataPrevisao").value;
        
        const fotoData = await converterParaBase64(document.getElementById("foto").files[0]);
        payload.fotoBase64 = fotoData.base64;
        payload.fotoNome = fotoData.nome;
        payload.fotoTipo = fotoData.tipo;
      } else {
        payload.dataConclusao = document.getElementById("dataConclusao").value;
        payload.valorFinal = document.getElementById("valorFinal").value;
        
        const nfData = await converterParaBase64(document.getElementById("nf").files[0]);
        const nsData = await converterParaBase64(document.getElementById("ns").files[0]);
        payload.nfBase64 = nfData.base64; payload.nfNome = nfData.nome; payload.nfTipo = nfData.tipo;
        payload.nsBase64 = nsData.base64; payload.nsNome = nsData.nome; payload.nsTipo = nsData.tipo;
      }

      const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
      const resultado = await response.json();

      if (resultado.status === "ok") {
        statusDiv.style.color = "green"; statusDiv.innerText = resultado.message;
        document.getElementById("formManutencao").reset(); alternarCampos();
      } else {
        statusDiv.style.color = "red"; statusDiv.innerText = "Erro: " + resultado.message;
      }
    } catch (err) {
      statusDiv.style.color = "red"; statusDiv.innerText = "Erro: " + err.message;
    } finally {
      btn.disabled = false; btn.innerText = "Enviar Lançamento";
    }
  });
</script>
